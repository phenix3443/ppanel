name: Publish Branch Image

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ppanel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve server release repository
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          CANDIDATES=(
            "${OWNER}/ppanel-server"
            "${OWNER}/server"
          )

          if [ "$OWNER" != "perfect-panel" ]; then
            CANDIDATES+=("perfect-panel/server")
          fi

          for candidate in "${CANDIDATES[@]}"; do
            status_code="$(
              curl -sS -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${candidate}/releases/latest"
            )"

            if [ "$status_code" = "200" ]; then
              echo "SERVER_REPO=$candidate" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "Unable to locate a server release repository for ${OWNER}" >&2
          exit 1
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run server download script
        run: |
          chmod +x ./script/server.sh
          ./script/server.sh --repo "$SERVER_REPO" --force

      - name: Download GeoIP database
        run: |
          mkdir -p cache
          curl -fsSL --retry 5 --retry-delay 2 \
            -o cache/GeoLite2-City.mmdb \
            https://raw.githubusercontent.com/adysec/IP_database/main/geolite/GeoLite2-City.mmdb
          test -s cache/GeoLite2-City.mmdb

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
