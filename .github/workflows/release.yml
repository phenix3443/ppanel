name: Release

on:
  repository_dispatch:
    types: [trigger-build]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: true
      server_repo:
        description: "Server release repository (optional when vars.SERVER_REPO is set)"
        required: false

jobs:
  build-and-push:
    name: Build and push multi-platform images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ppanel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build inputs
        run: |
          TAG="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          SERVER_REPO="${INPUT_SERVER_REPO:-${DISPATCH_SERVER_REPO:-${DEFAULT_SERVER_REPO:-}}}"

          if [ -z "$TAG" ]; then
            echo "tag is required" >&2
            exit 1
          fi

          if [ -z "$SERVER_REPO" ]; then
            echo "server_repo is required; provide it via workflow input, repository_dispatch payload, or vars.SERVER_REPO" >&2
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "SERVER_REPO=$SERVER_REPO" >> "$GITHUB_ENV"
        env:
          DEFAULT_SERVER_REPO: ${{ vars.SERVER_REPO }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          DISPATCH_SERVER_REPO: ${{ github.event.client_payload.server_repo }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_SERVER_REPO: ${{ inputs.server_repo }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run server download script
        run: |
          chmod +x ./script/server.sh
          ./script/server.sh --repo "$SERVER_REPO" --tag "$TAG" --force

      - name: List files after download
        run: ls -la .

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Image push info
        run: |
          echo "Pushed images:"
          echo "  $IMAGE_NAME:${TAG}"
          echo "  $IMAGE_NAME:latest"
