name: Release

on:
  repository_dispatch:
    types: [trigger-build]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: true
      server_repo:
        description: "Server release repository (optional when auto-detect succeeds)"
        required: false

jobs:
  build-and-push:
    name: Build and push multi-platform images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ppanel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve build inputs
        run: |
          TAG="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          SERVER_REPO="${INPUT_SERVER_REPO:-${DISPATCH_SERVER_REPO:-}}"

          if [ -z "$TAG" ]; then
            echo "tag is required" >&2
            exit 1
          fi

          if [ -z "$SERVER_REPO" ]; then
            OWNER="${GITHUB_REPOSITORY_OWNER}"
            CANDIDATES=(
              "${OWNER}/ppanel-server"
              "${OWNER}/server"
            )

            if [ "$OWNER" != "perfect-panel" ]; then
              CANDIDATES+=("perfect-panel/server")
            fi

            for candidate in "${CANDIDATES[@]}"; do
              status_code="$(
                curl -sS -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${candidate}/releases/tags/${TAG}"
              )"

              if [ "$status_code" = "200" ]; then
                SERVER_REPO="$candidate"
                break
              fi
            done
          fi

          if [ -z "$SERVER_REPO" ]; then
            echo "server_repo is required; no matching release tag '${TAG}' was found in auto-detect candidates" >&2
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "SERVER_REPO=$SERVER_REPO" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          DISPATCH_SERVER_REPO: ${{ github.event.client_payload.server_repo }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_SERVER_REPO: ${{ inputs.server_repo }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run server download script
        run: |
          chmod +x ./script/server.sh
          ./script/server.sh --repo "$SERVER_REPO" --tag "$TAG" --force

      - name: Download GeoIP database
        run: |
          mkdir -p cache
          curl -fsSL --retry 5 --retry-delay 2 \
            -o cache/GeoLite2-City.mmdb \
            https://raw.githubusercontent.com/adysec/IP_database/main/geolite/GeoLite2-City.mmdb
          test -s cache/GeoLite2-City.mmdb

      - name: List files after download
        run: ls -la .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Image push info
        run: |
          echo "Pushed images:"
          echo "  $IMAGE_NAME:${TAG}"
          echo "  $IMAGE_NAME:latest"
